<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokladní Inventura</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<div id="login-screen">
    <h2>Pokladní Systém</h2>
    <input type="password" id="password-input" placeholder="Zadejte přístupové heslo" onkeypress="handleKeyPress(event)">
    <div id="login-error" class="error-msg">Nesprávné heslo, zkuste to znovu.</div>
    <button onclick="checkPassword()">Vstoupit do inventury</button>
</div>

<div id="main-app" class="container hidden">
    <div class="header">
        <h1>Pokladní Inventura</h1>
        <div class="total-box">
            Celková očekávaná tržba: <span id="total-revenue">0</span> Kč
        </div>
    </div>

    <div class="controls">
        <input type="file" id="file-upload" accept=".csv, .xlsx, .xls" />
        <button id="export-btn" class="hidden" onclick="exportData()">Uložit inventuru a stáhnout Excel</button>
        <button id="email-btn" class="hidden btn-email" onclick="sendEmailOverview()">Poslat přehled e-mailem</button>
    </div>

    <div class="table-wrapper">
        <table id="inventory-table" class="hidden">
            <thead id="table-head">
                </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    const APP_PASSWORD = "admin123";

    let inventoryData = [];
    let headers = [];
    let itemColumnKey = ""; 

    const COL_START = "Začátek";
    const COL_END = "Konec";
    const COL_SALE = "Prodej";
    const COL_PRICE = "Cena";
    const COL_REV = "Tržba";
    const COL_NOTE = "Poznámka";

    function checkPassword() {
        const input = document.getElementById('password-input').value;
        const errorDiv = document.getElementById('login-error');
        
        if (input === APP_PASSWORD) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
        } else {
            errorDiv.style.display = 'block';
            document.getElementById('password-input').value = '';
        }
    }

    document.getElementById('file-upload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            
            const json = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
            if(json.length === 0) return alert("Soubor je prázdný!");

            headers = XLSX.utils.sheet_to_json(worksheet, { header: 1 })[0];
            itemColumnKey = headers[0]; 
            
            inventoryData = json.map((item, index) => {
                if (!item[itemColumnKey] || item[itemColumnKey].toString().trim() === "") return null;

                let startQty = 0;
                if (item[COL_END] !== undefined && item[COL_END] !== "") {
                    startQty = parseFloat(item[COL_END]) || 0;
                } else {
                    startQty = parseFloat(item[COL_START]) || 0;
                }

                let endQty = ""; 
                let price = parseFloat(item[COL_PRICE]) || 0;

                return {
                    id: index,
                    name: item[itemColumnKey],
                    start: startQty,
                    end: endQty,
                    price: price,
                    note: item[COL_NOTE] || ''
                };
            }).filter(item => item !== null);

            generateTableDOM();
            calculateTotalRevenue();
            
            document.getElementById('inventory-table').classList.remove('hidden');
            document.getElementById('export-btn').classList.remove('hidden');
            document.getElementById('email-btn').classList.remove('hidden');
        };
        reader.readAsArrayBuffer(file);
    });

    function generateTableDOM() {
        const thead = document.getElementById('table-head');
        const tbody = document.getElementById('table-body');
        
        thead.innerHTML = `<tr>
            <th>${itemColumnKey}</th>
            <th>${COL_START}</th>
            <th>${COL_END} (Zadej)</th>
            <th>${COL_SALE}</th>
            <th>${COL_PRICE}</th>
            <th>${COL_REV}</th>
            <th>${COL_NOTE}</th>
        </tr>`;

        tbody.innerHTML = '';

        inventoryData.forEach((item) => {
            let sale = 0;
            let revenue = 0;

            if (item.end !== "") {
                sale = item.start - item.end;
                revenue = Math.round(sale * item.price);
            }

            const saleStr = sale > 0 ? parseFloat(sale.toFixed(2)) : 0;
            const revStr = revenue > 0 ? revenue + ' Kč' : '0 Kč';
            const priceStr = parseFloat(item.price.toFixed(2)) + ' Kč';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight: 500;">${item.name}</td>
                <td>${item.start}</td>
                <td class="bg-input-cell">
                    <input type="number" step="any" class="qty-input" value="${item.end}" onfocus="this.select()" oninput="updateRowLive(${item.id}, this.value)">
                </td>
                <td id="sale-${item.id}" class="${sale > 0 ? 'text-positive' : ''}">${saleStr}</td>
                <td>${priceStr}</td>
                <td id="rev-${item.id}" class="${revenue > 0 ? 'text-positive' : ''}">${revStr}</td>
                <td class="note-cell">${item.note}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function updateRowLive(id, value) {
        const item = inventoryData.find(i => i.id === id);
        if (!item) return;

        let cleanValue = value.replace(',', '.');
        item.end = cleanValue === "" ? "" : parseFloat(cleanValue);

        let sale = 0;
        let revenue = 0;

        if (item.end !== "") {
            sale = item.start - item.end;
            revenue = Math.round(sale * item.price);
        }

        const saleCell = document.getElementById(`sale-${id}`);
        const revCell = document.getElementById(`rev-${id}`);

        const saleStr = sale > 0 ? parseFloat(sale.toFixed(2)) : 0;
        const revStr = revenue > 0 ? revenue + ' Kč' : '0 Kč';

        saleCell.innerText = saleStr;
        saleCell.className = sale > 0 ? 'text-positive' : '';

        revCell.innerText = revStr;
        revCell.className = revenue > 0 ? 'text-positive' : '';

        calculateTotalRevenue();
    }

    function calculateTotalRevenue() {
        let totalRevenue = 0;
        inventoryData.forEach(item => {
            if (item.end !== "") {
                const sale = item.start - item.end;
                if (sale > 0) {
                    totalRevenue += Math.round(sale * item.price);
                }
            }
        });
        document.getElementById('total-revenue').innerText = totalRevenue;
    }

    function exportData() {
        const dataToExport = [];
        const exportHeaders = [itemColumnKey, COL_START, COL_END, COL_SALE, COL_PRICE, COL_REV, COL_NOTE];
        dataToExport.push(exportHeaders);
        
        inventoryData.forEach(item => {
            const sale = item.end !== "" ? item.start - item.end : 0;
            const revenue = sale > 0 ? Math.round(sale * item.price) : 0;
            
            dataToExport.push([
                item.name,
                item.start,
                item.end !== "" ? item.end : "",
                sale > 0 ? parseFloat(sale.toFixed(2)) : 0,
                item.price,
                revenue,
                item.note
            ]);
        });

        const worksheet = XLSX.utils.aoa_to_sheet(dataToExport);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Inventura");

        XLSX.writeFile(workbook, `Inventura_Hotovo_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    function sendEmailOverview() {
        const todayDate = new Date().toLocaleDateString('cs-CZ');
        const subject = todayDate;

        const dataToExport = [];
        const exportHeaders = [itemColumnKey, COL_START, COL_END, COL_SALE, COL_PRICE, COL_REV, COL_NOTE];
        dataToExport.push(exportHeaders);
        
        inventoryData.forEach(item => {
            const sale = item.end !== "" ? item.start - item.end : 0;
            const revenue = sale > 0 ? Math.round(sale * item.price) : 0;
            
            dataToExport.push([
                item.name,
                item.start,
                item.end !== "" ? item.end : "",
                sale > 0 ? parseFloat(sale.toFixed(2)) : 0,
                item.price,
                revenue,
                item.note
            ]);
        });

        const worksheet = XLSX.utils.aoa_to_sheet(dataToExport);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "Inventura");
        
        const excelBuffer = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
        const excelBlob = new Blob([excelBuffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const fileName = `Inventura_${new Date().toISOString().split('T')[0]}.xlsx`;

        const formData = new FormData();
        formData.append("access_key", "WEB3FORMS_KEY"); // TODO
        formData.append("subject", subject);
        formData.append("message", "");
        formData.append("attachment", excelBlob, fileName);
        
        fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                alert("Odesláno");
            } else {
                alert("Chyba");
            }
        })
        .catch(() => {
            alert("Chyba");
        });
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') checkPassword();
    }
</script>
</body>
</html>
